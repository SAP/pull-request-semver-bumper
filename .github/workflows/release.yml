name: Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g., 1.0.0)"
                required: true

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Validate Version
              run: |
                  if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "::error::Version must be in format X.Y.Z (e.g., 1.0.0)"
                    exit 1
                  fi
                  echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
                  echo "MAJOR_VERSION=$(echo ${{ inputs.version }} | cut -d. -f1)" >> $GITHUB_ENV

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Tagging
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Tag main directly so the tag is reachable from main.
                  # This ensures GitHub's release notes range computation works correctly,
                  # using the previous release tag rather than the repo's initial commit.
                  git tag "v$VERSION"
                  git push origin "v$VERSION"

                  # Force update the major tag to point to this new release
                  git tag -f "v$MAJOR_VERSION"
                  git push -f origin "v$MAJOR_VERSION"

            - name: Update References for Release
              run: |
                  # Create a release branch to hold the @main→@vX reference substitution.
                  # This branch is not merged back; its purpose is only to carry the
                  # pinned-reference variant of the action files.
                  git checkout -b "release/v$VERSION"

                  # Replace @main with @v{major} in action.yml and sub-actions
                  find . -name "action.yml" -print0 | xargs -0 sed -i "s|@main|@v$MAJOR_VERSION|g"

                  # Verify if any changes were made
                  git diff

            - name: Commit Release Changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Only commit if there are changes
                  if ! git diff --quiet; then
                    git add .
                    git commit -m "chore: prepare release v$VERSION"
                  else
                    echo "No changes to commit (references might already be correct or using relative paths)."
                  fi

            - name: Create Release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
              with:
                  tag_name: "v${{ inputs.version }}"
                  name: "v${{ inputs.version }}"
                  generate_release_notes: true
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
