# CodeQL Advanced setup for SAP/pull-request-semver-bumper
#
# Scans:
#   - GitHub Actions workflows and action definitions  (language: actions)
#   - TypeScript / JavaScript sources                  (language: javascript-typescript)
#
# Triggers:
#   - push to main                  (baseline analysis of merged code)
#   - pull_request_target on main   (PR head analysis, including fork PRs)
#   - weekly schedule               (catches new queries / advisories)
#
# Security model for fork PRs:
#   - pull_request_target runs in the BASE repo context using the workflow
#     file from main; the fork cannot modify what runs here.
#   - We explicitly check out the PR head with persist-credentials: false so
#     the base-repo token is never exposed to fork code.
#   - build-mode: none for both languages — CodeQL extracts directly from
#     source. No `npm install`, no `run:` step executes fork code.

name: "CodeQL Advanced"

on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
  schedule:
    - cron: '26 1 * * 3'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # On pull_request_target, check out the PR head (incl. forks).
          # On push/schedule, fall back to the workflow ref.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Do NOT expose the base-repo token to fork code.
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          # Use the security-and-quality suite to also report quality alerts,
          # which the repo ruleset's `code_quality` rule consumes.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
